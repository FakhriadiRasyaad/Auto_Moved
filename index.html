<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <h1>Admin Login 💖</h1>

    <form id="adminLoginForm">
      <input type="email" id="username" placeholder="Email" autocomplete="email" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>

      <button type="submit">Login User Flow</button>
      <button type="button" id="submited">Login Admin Dashboard</button>
    </form>
  </div>
</div>

<script type="module" src="./assets/js/auth.js"></script>

</body>
</html>
