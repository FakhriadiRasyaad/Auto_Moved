<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Cabang — Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #f7f3ed;
      --card-bg:    #ffffff;
      --pink:       #d63f6b;
      --pink-dark:  #b02d55;
      --pink-light: #fce8ee;
      --brown:      #2c1810;
      --muted:      #8c7268;
      --border:     #e8ddd6;
      --shadow-sm:  0 4px 12px rgba(44,24,16,0.08);
      --shadow-hov: 0 12px 24px rgba(214,63,107,0.15);
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* ── AUTO-DETECT BANNER ── */
    .auto-banner {
      display: none; /* ditampilkan via JS saat auto-detect aktif */
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white;
      text-align: center;
      padding: 14px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .auto-banner.show { display: flex; }

    .auto-banner .branch-name {
      background: rgba(255,255,255,0.25);
      padding: 3px 12px;
      border-radius: 30px;
      font-weight: 700;
    }

    .auto-banner .btn-change {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: white;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .auto-banner .btn-change:hover { background: rgba(255,255,255,0.35); }

    /* ── REDIRECT OVERLAY ── */
    .redirect-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(247,243,237,0.95);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .redirect-overlay.show { display: flex; }

    .redirect-icon {
      font-size: 3.5rem;
      animation: bounce 0.8s ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .redirect-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--brown);
    }

    .redirect-sub {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .redirect-progress {
      width: 200px; height: 5px;
      background: var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .redirect-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--pink-dark));
      border-radius: 5px;
      animation: fillBar 1.5s ease-out forwards;
    }

    @keyframes fillBar { from { width: 0% } to { width: 100% } }

    /* ── HERO ── */
    .hero {
      padding: 40px 24px 28px;
      text-align: center;
    }

    .hero-cam {
      display: inline-flex; align-items: center; justify-content: center;
      width: 72px; height: 72px; border-radius: 22px;
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      font-size: 34px; margin-bottom: 18px;
      box-shadow: 0 10px 28px rgba(214,63,107,0.25);
      transition: transform 0.3s;
    }

    .hero-cam:hover { transform: scale(1.05); }

    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: 32px; font-weight: 900; color: var(--brown);
      margin-bottom: 8px; letter-spacing: -0.02em;
    }

    .hero h1 em { color: var(--pink); font-style: italic; }

    .hero p { font-size: 14px; color: var(--muted); max-width: 280px; margin: 0 auto; }

    /* ── SEARCH BOX ── */
    .search-wrap {
      max-width: 560px; width: 100%;
      margin: 0 auto 0;
      padding: 0 20px 16px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--brown);
      background: var(--card-bg);
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(214,63,107,0.1);
    }

    /* ── BRANCH LIST ── */
    .branch-section {
      flex: 1; max-width: 560px; width: 100%;
      margin: 0 auto; padding: 0 20px 48px;
    }

    .sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .branch-grid { display: flex; flex-direction: column; gap: 10px; }

    .branch-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; transition: var(--transition);
      box-shadow: var(--shadow-sm);
      animation: slideUp 0.4s ease both;
    }

    .branch-card:hover {
      border-color: var(--pink);
      box-shadow: var(--shadow-hov);
      transform: translateY(-2px);
    }

    .branch-card:active { transform: translateY(0); }

    /* Badge "Auto-Terdeteksi" */
    .branch-card.auto-detected {
      border-color: var(--pink);
      background: linear-gradient(135deg, #fff, var(--pink-light));
      box-shadow: var(--shadow-hov);
    }

    .auto-tag {
      font-size: 0.6rem; font-weight: 700;
      background: var(--pink); color: white;
      padding: 2px 8px; border-radius: 20px;
      letter-spacing: 0.3px; white-space: nowrap;
    }

    .bc-avatar {
      width: 48px; height: 48px; flex-shrink: 0;
      border-radius: 14px; background: var(--pink-light);
      color: var(--pink); display: flex; align-items: center;
      justify-content: center; font-size: 20px; font-weight: 800;
      font-family: 'Fraunces', serif;
      border: 2px solid rgba(214,63,107,0.15);
    }

    .bc-info { flex: 1; min-width: 0; }
    .bc-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 700; color: var(--brown); margin-bottom: 3px; }
    .bc-code { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

    .bc-arrow { color: var(--muted); font-size: 22px; transition: var(--transition); }
    .branch-card:hover .bc-arrow { transform: translateX(5px); color: var(--pink); }

    /* Skeleton */
    .skel {
      background: linear-gradient(90deg, #f0ebe5 25%, #e4dbd4 50%, #f0ebe5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px; height: 82px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .empty-state {
      text-align: center; padding: 50px 20px;
      color: var(--muted); font-size: 14px;
      background: var(--card-bg); border-radius: 20px;
      border: 1px solid var(--border);
    }
    .empty-state div:first-child { font-size: 48px; margin-bottom: 14px; opacity: 0.6; }

    .footer-note {
      text-align: center; padding: 18px 24px 28px;
      font-size: 11px; color: #c5b8b0;
      border-top: 1px solid var(--border);
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .branch-card:nth-child(1){ animation-delay:0.04s; }
    .branch-card:nth-child(2){ animation-delay:0.08s; }
    .branch-card:nth-child(3){ animation-delay:0.12s; }
    .branch-card:nth-child(4){ animation-delay:0.16s; }
    .branch-card:nth-child(5){ animation-delay:0.20s; }
    .branch-card:nth-child(6){ animation-delay:0.24s; }

    @media (max-width: 480px) {
      .hero h1 { font-size: 26px; }
      .branch-card { padding: 12px 16px; }
      .bc-avatar { width: 42px; height: 42px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Auto-redirect overlay -->
  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-icon">📍</div>
    <div class="redirect-title">Cabang Terdeteksi!</div>
    <div class="redirect-sub" id="redirectBranchName">Mengarahkan ke cabang...</div>
    <div class="redirect-progress"><div class="redirect-fill"></div></div>
  </div>

  <!-- Banner auto-detect (jika branch terdeteksi via URL/config) -->
  <div class="auto-banner" id="autoBanner">
    <span>📍 Kamu di:</span>
    <span class="branch-name" id="autoBranchLabel">—</span>
    <button class="btn-change" onclick="showAllBranches()">Ganti Cabang</button>
  </div>

  <div class="hero">
    <div class="hero-cam">📸</div>
    <h1>Ambil <em>Foto</em> Kamu!</h1>
    <p>Pilih cabang tempat kamu berfoto tadi</p>
  </div>

  <!-- Search cabang -->
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput"
      placeholder="🔍 Cari nama cabang..." oninput="filterBranches(this.value)">
  </div>

  <div class="branch-section">
    <div class="sec-label">Pilih Lokasi Cabang</div>
    <div class="branch-grid" id="branchGrid">
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </div>

  <div class="footer-note">📍 Photobooth System — Nikmati fotomu!</div>

  <script type="module">
    import { supabase } from "./assets/js/supabase.js";

    const grid      = document.getElementById("branchGrid");
    const autoBanner= document.getElementById("autoBanner");
    const autoLabel = document.getElementById("autoBranchLabel");
    const overlay   = document.getElementById("redirectOverlay");
    const searchInp = document.getElementById("searchInput");

    let allBranches     = [];   // semua branch dari Supabase
    let autoDetectedId  = null; // branch ID yang terdeteksi otomatis

    // ══════════════════════════════════════════════
    //  AUTO-DETECT BRANCH
    //
    //  Prioritas:
    //  1. URL param: ?branch=BRANCH_ID atau ?code=BRANCH_CODE
    //     Contoh: guest-select-branch.html?branch=uuid-123
    //     → Admin bisa buat QR code/shortcut dengan URL ini
    //     → Pengguna langsung di-redirect ke halaman login cabang tsb
    //
    //  2. localStorage "adminBranchId" (dari login admin di device yang sama)
    //     → Jika device photobooth dipakai admin, branch otomatis terdeteksi
    //
    //  3. Manual pilih (fallback)
    // ══════════════════════════════════════════════
    async function detectBranch() {
      // Cek URL params
      const params   = new URLSearchParams(window.location.search);
      const branchId = params.get("branch");
      const branchCode= params.get("code");

      // Cek dari localStorage (admin yang sedang login)
      const adminData = localStorage.getItem("currentAdmin");
      const adminBranchId = adminData ? JSON.parse(adminData)?.branch_id : null;

      return { branchId, branchCode, adminBranchId };
    }

    // ══════════════════════════════════════════════
    //  LOAD SEMUA BRANCH
    // ══════════════════════════════════════════════
    async function loadBranches() {
      const { branchId, branchCode, adminBranchId } = await detectBranch();

      const { data: branches, error } = await supabase
        .from("branches")
        .select("id, name, code")
        .order("name", { ascending: true });

      if (error || !branches?.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div>🏪</div>
            <div>Tidak ada cabang tersedia.</div>
            <p style="margin-top:10px;font-size:12px;">Silakan hubungi admin.</p>
          </div>`;
        return;
      }

      allBranches = branches;

      // ─── Cari branch yang cocok dengan deteksi otomatis ───
      let autoMatch = null;

      if (branchId) {
        // Dari URL param ?branch=uuid
        autoMatch = branches.find(b => b.id === branchId);
      } else if (branchCode) {
        // Dari URL param ?code=KODE
        autoMatch = branches.find(b =>
          b.code?.toLowerCase() === branchCode.toLowerCase()
        );
      } else if (adminBranchId) {
        // Dari session admin yang login di device ini
        autoMatch = branches.find(b => b.id === adminBranchId);
      }

      if (autoMatch) {
        autoDetectedId = autoMatch.id;

        // Jika dari URL param → langsung redirect otomatis
        if (branchId || branchCode) {
          showRedirectOverlay(autoMatch);
          setTimeout(() => pickBranch(autoMatch.id, autoMatch.name, autoMatch.code), 1800);
          return;
        }

        // Jika dari admin login → tampilkan banner
        autoBanner.classList.add("show");
        autoLabel.textContent = autoMatch.name;
      }

      renderBranches(branches, autoDetectedId);
    }

    // ══════════════════════════════════════════════
    //  RENDER DAFTAR BRANCH
    // ══════════════════════════════════════════════
    function renderBranches(branches, highlightId = null) {
      if (!branches?.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div>🔍</div>
            <div>Tidak ada cabang yang cocok.</div>
          </div>`;
        return;
      }

      // Branch yang di-highlight (auto-detected) tampil pertama
      const sorted = highlightId
        ? [...branches].sort((a, b) => (a.id === highlightId ? -1 : b.id === highlightId ? 1 : 0))
        : branches;

      grid.innerHTML = sorted.map(b => {
        const isAuto = b.id === highlightId;
        const safeName = b.name.replace(/'/g, "\\'");
        return `
          <div class="branch-card${isAuto ? " auto-detected" : ""}"
               onclick="pickBranch('${b.id}', '${safeName}', '${b.code}')">
            <div class="bc-avatar">${b.name.charAt(0).toUpperCase()}</div>
            <div class="bc-info">
              <div class="bc-name">
                ${b.name}
                ${isAuto ? `<span class="auto-tag">📍 Lokasi Kamu</span>` : ""}
              </div>
              <div class="bc-code">🔑 ${b.code}</div>
            </div>
            <div class="bc-arrow">›</div>
          </div>
        `;
      }).join("");
    }

    // ══════════════════════════════════════════════
    //  FILTER / SEARCH CABANG
    // ══════════════════════════════════════════════
    window.filterBranches = function(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderBranches(allBranches, autoDetectedId);
        return;
      }
      const filtered = allBranches.filter(b =>
        b.name.toLowerCase().includes(q) || b.code?.toLowerCase().includes(q)
      );
      renderBranches(filtered, autoDetectedId);
    };

    // ══════════════════════════════════════════════
    //  TAMPILKAN SEMUA BRANCH (reset auto-filter)
    // ══════════════════════════════════════════════
    window.showAllBranches = function() {
      autoBanner.classList.remove("show");
      autoDetectedId = null;
      searchInp.value = "";
      renderBranches(allBranches, null);
    };

    // ══════════════════════════════════════════════
    //  OVERLAY REDIRECT (saat branch terdeteksi dari URL)
    // ══════════════════════════════════════════════
    function showRedirectOverlay(branch) {
      document.getElementById("redirectBranchName").textContent =
        `Mengarahkan ke ${branch.name}...`;
      overlay.classList.add("show");
    }

    // ══════════════════════════════════════════════
    //  PILIH BRANCH → simpan ke sessionStorage & redirect
    // ══════════════════════════════════════════════
    window.pickBranch = function(id, name, code) {
      sessionStorage.setItem("selectedBranch", JSON.stringify({ id, name, code }));
      sessionStorage.removeItem("guestData");
      window.location.href = "guest-login.html";
    };

    // ── INIT ──
    loadBranches();
  </script>
</body>
</html>
