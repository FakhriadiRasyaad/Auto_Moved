<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Tamu — Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#f7f3ed; --card:#ffffff;
      --pink:#d63f6b; --pink-d:#b02d55; --rose:#fce8ee;
      --brown:#2c1810; --muted:#8c7268; --border:#e8ddd6;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

    .card { background:var(--card); border-radius:32px; padding:40px 36px; width:100%; max-width:440px; border:1px solid var(--border); box-shadow:0 4px 12px rgba(44,24,16,.06),0 20px 40px rgba(44,24,16,.1); animation:up .5s cubic-bezier(.22,1,.36,1) both; }
    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .branch-chip { display:flex; align-items:center; gap:12px; background:var(--rose); border:1px solid rgba(214,63,107,.2); border-radius:16px; padding:12px 16px; margin-bottom:28px; }
    .bc-dot { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--pink),var(--pink-d)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; font-size:18px; flex-shrink:0; }
    .bc-text .bname { font-size:14px; font-weight:700; color:var(--brown); }
    .bc-text .bsub  { font-size:11px; color:var(--muted); margin-top:2px; }

    .title { font-family:'Fraunces',serif; font-size:28px; font-weight:900; color:var(--brown); margin-bottom:6px; }
    .title em { color:var(--pink); font-style:italic; }
    .subtitle { font-size:14px; color:var(--muted); margin-bottom:28px; }

    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.8px; }
    .field input { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--brown); background:#fbf8f5; outline:none; transition:all .2s; }
    .field input:focus { border-color:var(--pink); background:white; box-shadow:0 0 0 4px rgba(214,63,107,.1); }
    .field input::placeholder { color:#c0ada2; font-weight:300; }

    .btn { width:100%; margin-top:16px; background:linear-gradient(135deg,var(--pink),var(--pink-d)); color:white; border:none; border-radius:16px; padding:16px; font-size:15px; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; box-shadow:0 8px 20px rgba(214,63,107,.3); transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(214,63,107,.4); }
    .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .err { background:#fef2f5; border:1px solid #f9bece; border-radius:12px; padding:12px 16px; font-size:13px; color:var(--pink-d); margin-top:14px; display:none; text-align:center; font-weight:500; }
    .err.show { display:block; }

    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .mini-spin { width:12px; height:12px; border:2px solid rgba(214,63,107,.2); border-top-color:var(--pink); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Info cabang otomatis -->
    <div class="branch-chip" id="branchChip">
      <div class="bc-dot" id="branchInitial"><div class="mini-spin"></div></div>
      <div class="bc-text">
        <div class="bname" id="branchName">Memuat cabang...</div>
        <div class="bsub"  id="branchCode">—</div>
      </div>
    </div>

    <div class="title">Hai, <em>Selamat</em> Datang!</div>
    <div class="subtitle">Masukkan nama &amp; nomor HP untuk melihat foto kamu</div>

    <div class="field">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="cth: Budi Santoso" autocomplete="name">
    </div>
    <div class="field">
      <label>Nomor HP</label>
      <input type="tel" id="nohp" placeholder="cth: 081234567890" autocomplete="tel">
    </div>

    <button class="btn" id="btnLogin" onclick="doLogin()">
      <span>✨</span> Lihat Foto Saya
    </button>
    <div class="err" id="errBox"></div>
  </div>

  <script type="module">
    import { supabase } from "./assets/js/supabase.js";

    // ── AUTO DETECT BRANCH ──────────────────────────────────────────────
    let currentBranch = null;

    async function autoDetectBranch() {
      // 1. Dari sessionStorage (sudah ada sebelumnya)
      try {
        const stored = JSON.parse(sessionStorage.getItem("selectedBranch"));
        if (stored?.id) { currentBranch = stored; applyBranchUI(); return; }
      } catch(e){}

      // 2. Dari admin yang login di device ini
      try {
        const admin = JSON.parse(localStorage.getItem("currentAdmin"));
        if (admin?.branch_id) {
          const { data, error } = await supabase.from("branches").select("id,name,code").eq("id", admin.branch_id).single();
          if (!error && data) {
            currentBranch = { id:data.id, name:data.name, code:data.code };
            sessionStorage.setItem("selectedBranch", JSON.stringify(currentBranch));
            applyBranchUI(); return;
          }
        }
      } catch(e){}

      // 3. Fetch branch pertama dari Supabase
      try {
        const { data: branches } = await supabase.from("branches").select("id,name,code").order("name").limit(1);
        if (branches?.length) {
          currentBranch = { id:branches[0].id, name:branches[0].name, code:branches[0].code };
          sessionStorage.setItem("selectedBranch", JSON.stringify(currentBranch));
          applyBranchUI(); return;
        }
      } catch(e){}

      // Gagal
      document.getElementById("branchInitial").innerHTML = "❌";
      document.getElementById("branchName").textContent  = "Cabang tidak ditemukan";
      document.getElementById("branchCode").textContent  = "Hubungi admin";
      document.getElementById("btnLogin").disabled = true;
    }

    function applyBranchUI() {
      document.getElementById("branchInitial").textContent = currentBranch.name.charAt(0).toUpperCase();
      document.getElementById("branchName").textContent    = currentBranch.name;
      document.getElementById("branchCode").textContent    = currentBranch.code ? `Kode: ${currentBranch.code}` : "📍 Cabang Aktif";
    }

    // ── LOGIN GUEST ────────────────────────────────────────────────────
    window.doLogin = async function() {
      hideErr();
      if (!currentBranch) { showErr("Cabang belum terdeteksi. Muat ulang halaman."); return; }

      const nama = document.getElementById("nama").value.trim();
      const nohp = document.getElementById("nohp").value.trim().replace(/\s+/g,"");
      if (!nama || !nohp) { showErr("Nama dan nomor HP wajib diisi!"); return; }

      setLoading(true);

      try {
        // Cari guest di branch ini
        let { data: guests } = await supabase.from("guests")
          .select("id,nama,nohp,branch_id")
          .ilike("nama", nama)
          .eq("nohp", nohp)
          .eq("branch_id", currentBranch.id);

        // Fallback: cari tanpa filter branch
        if (!guests?.length) {
          const { data: guests2 } = await supabase.from("guests")
            .select("id,nama,nohp,branch_id")
            .ilike("nama", nama)
            .eq("nohp", nohp);
          guests = guests2;
        }

        if (!guests?.length) {
          setLoading(false);
          showErr("Nama atau nomor HP tidak ditemukan. Pastikan data sesuai yang diinput admin.");
          return;
        }

        // Simpan guestData & redirect ke gallery
        sessionStorage.setItem("guestData", JSON.stringify({ guest: guests[0] }));
        setLoading(false);
        window.location.href = "guest-gallery.html";

      } catch(err) {
        console.error(err);
        setLoading(false);
        showErr("Terjadi kesalahan. Coba lagi.");
      }
    };

    function showErr(m) { const b=document.getElementById("errBox"); b.textContent=m; b.classList.add("show"); }
    function hideErr()   { document.getElementById("errBox").classList.remove("show"); }
    function setLoading(on) {
      const btn=document.getElementById("btnLogin");
      btn.disabled=on;
      btn.innerHTML=on?'<span class="spinner"></span>Mencari foto...' :'<span>✨</span> Lihat Foto Saya';
    }

    document.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
    autoDetectBranch();
  </script>
</body>
</html>
