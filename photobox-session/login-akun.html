<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk Akun — Photobooth</title>
  <meta name="description" content="Masuk ke akun Photobooth Anda untuk memulai sesi foto premium." />
  
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f4f4f5, #e4e4e7, #d4d4d8);
      color: #000000;
      overflow: hidden;
      /* Lock viewport height completely */
    }

    .landing-page {
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .left-side,
    .right-side {
      width: 50%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 36px;
    }

    .left-side {
      background: rgba(244, 244, 245, 0.4);
    }

    @keyframes entryBounce {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(25px);
      }

      60% {
        opacity: 1;
        transform: scale(1.03) translateY(-3px);
      }

      80% {
        transform: scale(0.99) translateY(1px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .login-card-wrapper {
      width: 100%;
      max-width: 410px;
      display: flex;
      justify-content: center;
      animation: entryBounce 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .login-form-container {
      width: 100%;
      padding: 24px 30px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      transition: transform 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        box-shadow 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        border-color 0.4s ease;
    }

    .login-form-container:hover {
      transform: scale(1.05);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.14);
      border-color: rgba(0, 0, 0, 0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .iconex-light-camera {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .text-wrapper {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #000000;
    }

    .text-wrapper-2 {
      margin-bottom: 2px;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 800;
      color: #000000;
    }

    .text-wrapper-2 em {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
    }

    .sub-title-desc {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .form-group {
      width: 100%;
      margin-bottom: 8px;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 2px;
    }

    .input-label svg {
      color: #000000;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }

    .input-box {
      width: 100%;
      height: 38px;
      padding: 0 14px;
      border: 1.5px solid #d4d4d8;
      border-radius: 10px;
      outline: none;
      background: #ffffff;
      font-size: 12px;
      color: #000000;
      transition: 0.25s ease;
    }

    .input-box::placeholder {
      color: #a1a1aa;
    }

    .input-box:focus {
      border-color: #000000;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    .rectangle-2 {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      background: #000000;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 14px;
      transition: 0.25s ease;
    }

    .rectangle-2:hover:not(:disabled) {
      transform: translateY(-2px);
      background: #222222;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.22);
    }

    .btn-icon {
      margin-left: 4px;
      transition: transform 0.3s ease;
    }

    .rectangle-2:hover:not(:disabled) .btn-icon {
      transform: translateX(4px);
    }

    .rectangle-2:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .register-footer {
      font-size: 10.5px;
      color: #71717a;
      margin-top: 14px;
      text-align: left;
      width: 100%;
    }

    .register-footer a {
      color: #000000;
      font-weight: 700;
      text-decoration: underline;
      transition: opacity 0.2s ease;
    }

    .register-footer a:hover {
      opacity: 0.7;
    }

    .err {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 10px;
      font-size: 11px;
      color: #b91c1c;
      margin-top: 10px;
      display: none;
      text-align: center;
      font-weight: 600;
    }

    .err.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .right-side {
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(161, 161, 170, 0.3), transparent 34%),
        radial-gradient(circle at bottom left, rgba(24, 24, 27, 0.15), transparent 35%);
    }

    .right-side::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      filter: blur(8px);
    }

    .strip-photo {
      position: relative;
      z-index: 1;
      width: min(76%, 380px);
      max-height: 82vh;
      object-fit: contain;
      transform: rotate(4deg);
      filter: drop-shadow(0 25px 40px rgba(0, 0, 0, 0.2));
      animation: floatPhoto 4s ease-in-out infinite;
    }

    @keyframes floatPhoto {

      0%,
      100% {
        transform: rotate(4deg) translateY(0);
      }

      50% {
        transform: rotate(4deg) translateY(-12px);
      }
    }

    /* ── FLUID SCALING (KEEPS DESKTOP STRUCTURE ALWAYS ON RESIZE/MINIMIZE) ── */
    @media (max-width: 1024px) {

      .left-side,
      .right-side {
        padding: 2vh 2vw;
      }

      .login-form-container {
        padding: 18px 22px;
        border-radius: 20px;
      }

      .logo {
        margin-bottom: 8px;
      }

      .logo img {
        width: 32px;
        height: 32px;
      }

      .logo-text {
        font-size: 12px;
      }

      .text-wrapper-2 {
        font-size: 24px;
      }

      .sub-title-desc {
        font-size: 11px;
        margin-bottom: 8px;
      }

      .form-group {
        margin-bottom: 6px;
      }

      .input-box {
        height: 34px;
        font-size: 11px;
      }

      .rectangle-2 {
        height: 36px;
        font-size: 12px;
        margin-top: 8px;
      }

      .strip-photo {
        max-height: 75vh;
      }
    }

    @media (max-width: 768px) {

      .left-side,
      .right-side {
        padding: 1.5vh 1.5vw;
      }

      .login-card-wrapper {
        max-width: 310px;
      }

      .login-form-container {
        padding: 14px 18px;
        border-radius: 16px;
      }

      .logo {
        margin-bottom: 6px;
      }

      .logo img {
        width: 28px;
        height: 28px;
      }

      .text-wrapper-2 {
        font-size: 20px;
      }

      .sub-title-desc {
        font-size: 10px;
        margin-bottom: 6px;
      }

      .form-group {
        margin-bottom: 4px;
      }

      .input-label {
        font-size: 10.5px;
        margin-bottom: 1px;
      }

      .input-box {
        height: 30px;
        font-size: 10.5px;
      }

      .rectangle-2 {
        height: 32px;
        font-size: 11.5px;
        margin-top: 6px;
      }

      .strip-photo {
        max-height: 70vh;
      }
    }

    @media (max-width: 480px) {

      .left-side,
      .right-side {
        padding: 1vh 1vw;
      }

      .login-card-wrapper {
        max-width: 240px;
      }

      .login-form-container {
        padding: 10px 12px;
        border-radius: 12px;
      }

      .logo img {
        width: 24px;
        height: 24px;
      }

      .text-wrapper-2 {
        font-size: 16px;
      }

      .sub-title-desc {
        font-size: 9px;
        margin-bottom: 4px;
      }

      .input-box {
        height: 26px;
        font-size: 9.5px;
      }

      .rectangle-2 {
        height: 28px;
        font-size: 10.5px;
      }

      .strip-photo {
        max-height: 60vh;
      }
    }

    /* Height-based scaling for short viewport heights */
    @media (max-height: 680px) {

      .left-side,
      .right-side {
        padding: 1vh 2vw;
      }

      .login-form-container {
        padding: 12px 18px;
      }

      .logo {
        margin-bottom: 4px;
      }

      .text-wrapper-2 {
        font-size: 20px;
      }

      .sub-title-desc {
        margin-bottom: 4px;
      }

      .form-group {
        margin-bottom: 4px;
      }

      .input-box {
        height: 30px;
        font-size: 11px;
      }

      .rectangle-2 {
        height: 32px;
        font-size: 12px;
        margin-top: 4px;
      }

      .strip-photo {
        max-height: 65vh;
      }
    }
  </style>
</head>

<body>
  <!-- Guard: cek admin login -->
  <script>
    if (!localStorage.getItem("currentAdmin")) {
      window.location.href = "../login-admin.html";
    }
  </script>

  <div class="landing-page">
    <div class="left-side">
      <div class="login-card-wrapper">
        <div class="login-form-container">

          <div class="logo">
            <img class="iconex-light-camera" src="../img/Logo_photobooth_LTI.png" alt="Logo Photobooth" />
            <div class="text-wrapper">PHOTOBOOTH</div>
          </div>

          <div class="text-wrapper-2">
            Masuk <em>Akun</em>
          </div>
          <p class="sub-title-desc">
            Masukkan Username dan No. HP Anda untuk memulai sesi foto
          </p>

          <div class="form-group">
            <div class="input-label">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              Username
            </div>
            <input type="text" id="nama" placeholder="cth: Budi Santoso" class="input-box" autocomplete="name" />
          </div>

          <div class="form-group">
            <div class="input-label">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
              </svg>
              Nomor HP
            </div>
            <input type="tel" id="nohp" placeholder="cth: 08XXXXXXXXXX" class="input-box" autocomplete="tel" />
          </div>

          <button class="rectangle-2" id="btnLogin" onclick="doLogin()">
            <span>Selanjutnya</span>
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>

          <div class="register-footer">
            Belum punya akun? <a href="daftar-akun.html">Daftar di sini</a>
          </div>

          <div class="err" id="errBox"></div>
        </div>
      </div>
    </div>

    <div class="right-side">
      <img class="strip-photo" src="../img/strip-photo.png" alt="Photo strip" />
    </div>
  </div>

  <script type="module">
    import { supabase } from "../assets/js/supabase.js";

    // ── GET ADMIN & BRANCH DETAILS ──────────────────────────────────────
    const admin = JSON.parse(localStorage.getItem("currentAdmin"));
    let branchId = null;

    if (admin) {
      branchId = admin.branch_id || null;
    }

    async function getBranchDetails() {
      if (!admin) return;
      
      // Auto-authenticate in background if using testing account bypass
      if (admin.username === "1@admin.com") {
        try {
          const { data } = await supabase.auth.getSession();
          if (!data.session) {
            console.log("Bypass mode detected: logging in to Supabase Auth...");
            await supabase.auth.signInWithPassword({ email: "1@admin.com", password: "1" });
          }
        } catch (e) {
          console.error("Gagal auto-auth:", e);
        }
      }

      if (!branchId) {
        try {
          const { data: pd } = await supabase.rpc("get_my_profile");
          branchId = pd?.[0]?.branch_id ?? null;
        } catch (e) {
          console.error("Gagal mendeteksi cabang:", e);
        }
      }
    }

    // ── LOGIN PROCESS ────────────────────────────────────────────────────
    window.doLogin = async function () {
      hideErr();
      const nama = document.getElementById("nama").value.trim();
      const rawNohp = document.getElementById("nohp").value.trim();

      if (!nama || !rawNohp) {
        showErr("Username dan nomor HP wajib diisi!");
        return;
      }

      setLoading(true);

      try {
        // Auto-authenticate jika menggunakan akun bypass testing dan session masih kosong
        if (admin && admin.username === "1@admin.com") {
          try {
            const { data } = await supabase.auth.getSession();
            if (!data.session) {
              console.log("Bypass mode: Authenticating Supabase Auth in doLogin...");
              await supabase.auth.signInWithPassword({ email: "1@admin.com", password: "1" });
            }
          } catch (e) {
            console.error("Gagal auto-auth saat doLogin:", e);
          }
        }

        // Tentukan branchId jika belum terambil
        if (!branchId && admin) {
          try {
            const { data: pd } = await supabase.rpc("get_my_profile");
            branchId = pd?.[0]?.branch_id ?? null;
          } catch (e) {
            console.error("Gagal mendeteksi cabang:", e);
          }
        }

        // Standardisasi input HP untuk pencocokan fleksibel
        const cleanInputPhone = rawNohp.replace(/[^0-9]/g, "");

        let matchedUser = null;

        // 1. Cari guest di branch admin ini dengan pencocokan nama
        if (branchId) {
          const { data, error } = await supabase.from("guests")
            .select("id,nama,nohp,email,branch_id")
            .ilike("nama", nama)
            .eq("branch_id", branchId);
          
          if (!error && data && data.length) {
            matchedUser = data.find(g => {
              const cleanDbPhone = (g.nohp || "").replace(/[^0-9]/g, "");
              return cleanDbPhone === cleanInputPhone || g.nohp.trim() === rawNohp;
            });
          }
        }

        // 2. Fallback: Cari secara global dengan pencocokan nama
        if (!matchedUser) {
          const { data, error } = await supabase.from("guests")
            .select("id,nama,nohp,email,branch_id")
            .ilike("nama", nama);
          
          if (!error && data && data.length) {
            matchedUser = data.find(g => {
              const cleanDbPhone = (g.nohp || "").replace(/[^0-9]/g, "");
              return cleanDbPhone === cleanInputPhone || g.nohp.trim() === rawNohp;
            });
          }
        }

        // 3. Fallback Kedua: Cari berdasarkan nomor HP saja (berguna jika ada typo di nama)
        if (!matchedUser) {
          // Cari exact match nohp
          let { data, error } = await supabase.from("guests")
            .select("id,nama,nohp,email,branch_id")
            .eq("nohp", rawNohp);
          
          if (!error && data && data.length) {
            matchedUser = data[0];
          } else {
            // Cari nohp dengan space-removed fallback jika database menyimpan data bersih
            const { data: dataClean, error: errorClean } = await supabase.from("guests")
              .select("id,nama,nohp,email,branch_id")
              .eq("nohp", cleanInputPhone);
            if (!errorClean && dataClean && dataClean.length) {
              matchedUser = dataClean[0];
            }
          }
        }

        if (!matchedUser) {
          setLoading(false);
          showErr("Akun tidak ditemukan. Silakan pastikan data benar atau daftarkan akun baru.");
          return;
        }

        // Simpan currentUser di localStorage
        localStorage.setItem("currentUser", JSON.stringify({
          id: matchedUser.id,
          nama: matchedUser.nama,
          nohp: matchedUser.nohp,
          email: matchedUser.email ?? "",
          branch_id: matchedUser.branch_id,
          admin_id: admin ? admin.id : null,
          foto: []
        }));

        setLoading(false);
        window.location.href = "pilih-paket.html";

      } catch (err) {
        console.error(err);
        setLoading(false);
        showErr("Terjadi kesalahan sistem. Coba lagi.");
      }
    };

    function showErr(m) {
      const b = document.getElementById("errBox");
      b.textContent = m;
      b.classList.add("show");
    }

    function hideErr() {
      document.getElementById("errBox").classList.remove("show");
    }

    function setLoading(on) {
      const btn = document.getElementById("btnLogin");
      btn.disabled = on;
      if (on) {
        btn.innerHTML = '<span class="spinner"></span> Memproses...';
      } else {
        btn.innerHTML = '<span>Selanjutnya</span><svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        doLogin();
      }
    });

    getBranchDetails();
  </script>
</body>

</html>
